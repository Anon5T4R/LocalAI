name: Release

# Dispara ao dar push numa tag vX.Y.Z (ou manualmente).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run_macos:
        description: "Incluir macOS no build (conta 10x minutos em repo privado)"
        type: boolean
        default: true

permissions:
  contents: read

env:
  # Versao dos binarios do llama.cpp a empacotar (mesma da suite toda desde
  # 2026-07-18). Bump aqui exige recalcular os llama_sha256 na matriz abaixo —
  # baixar os 3 assets e rodar sha256sum (politica: docs/planos/espelho-de-binarios.md).
  LLAMA_TAG: b10066

# Duas tags empurradas em sequência não disputam a mesma release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Monta a matriz dinamicamente: pula macOS quando run_macos=false (validacao barata).
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          # Supply-chain: versao FIXA + sha256 conferido antes de extrair, como nos
          # fetch-llama.* do resto da suite. Windows/Linux baixam do espelho
          # Anon5T4R/Local-runtimes (release v1; hashes = MANIFEST.json do espelho,
          # identicos ao upstream). O asset macos-arm64 NAO esta no espelho, entao
          # o macOS segue no upstream ggml-org — mas pinado e verificado igual.
          mirror="https://github.com/Anon5T4R/Local-runtimes/releases/download/v1"
          upstream="https://github.com/ggml-org/llama.cpp/releases/download/b10066"
          base='{"os":"windows-latest","llama_variant":"win-vulkan-x64","ext":"zip","llama_base":"'$mirror'","llama_sha256":"57cb5dd3143b2814b8d1d14587867628bfb126536abfa7085ca9560c4919d998","tauri_args":"--bundles nsis"},{"os":"ubuntu-22.04","llama_variant":"ubuntu-vulkan-x64","ext":"tar.gz","llama_base":"'$mirror'","llama_sha256":"37831256be31aacf8ffe5bfc0a88040ef6f0224c220777b28fd77d4198a0b902","tauri_args":"--bundles deb,appimage"}'
          # macos-13 (Intel) foi aposentado pelo GitHub — jobs ficavam presos na fila
          # para sempre (causa das releases "cancelled"). Só ARM (macos-latest) agora.
          mac='{"os":"macos-latest","llama_variant":"macos-arm64","ext":"tar.gz","llama_base":"'$upstream'","llama_sha256":"52db287b6f39dfab93cc0dd1953c13d2108ca12c2817431c79a169ed3da57597","tauri_args":"--bundles dmg"}'
          if [ "${{ github.event.inputs.run_macos }}" = "false" ]; then
            echo "matrix={\"include\":[$base]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"include\":[$base,$mac]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Só compila: não precisa de permissão de escrita em lugar nenhum.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Dependencias do sistema (Linux/Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Instalar deps do frontend
        run: npm ci

      - name: Baixar runtime do llama.cpp (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          $asset = "llama-${{ env.LLAMA_TAG }}-bin-${{ matrix.llama_variant }}.${{ matrix.ext }}"
          $url = "${{ matrix.llama_base }}/$asset"
          Invoke-WebRequest $url -OutFile llama.zip
          # Confere ANTES de extrair: binario adulterado nao chega a ser descompactado.
          $got = (Get-FileHash -Path llama.zip -Algorithm SHA256).Hash.ToLower()
          if ($got -ne "${{ matrix.llama_sha256 }}") {
            throw "SHA256 NAO BATE! esperado ${{ matrix.llama_sha256 }}, recebido $got"
          }
          Write-Host "sha256 conferido: $got"
          Expand-Archive llama.zip -DestinationPath src-tauri/binaries -Force

      - name: Baixar runtime do llama.cpp (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          asset="llama-${LLAMA_TAG}-bin-${{ matrix.llama_variant }}.${{ matrix.ext }}"
          url="${{ matrix.llama_base }}/${asset}"
          curl -fL --retry 3 --retry-delay 2 -o llama.tar.gz "$url"
          # Confere ANTES de extrair (sha256sum no Ubuntu, shasum no macOS).
          got=$( (sha256sum llama.tar.gz 2>/dev/null || shasum -a 256 llama.tar.gz) | cut -d' ' -f1 )
          if [ "$got" != "${{ matrix.llama_sha256 }}" ]; then
            echo "SHA256 NAO BATE! esperado ${{ matrix.llama_sha256 }}, recebido $got" >&2
            exit 1
          fi
          echo "sha256 conferido: $got"
          # os tarballs extraem para uma pasta llama-<tag>/ ; achatamos com strip-components
          tar -xzf llama.tar.gz -C src-tauri/binaries --strip-components=1
          chmod +x src-tauri/binaries/llama-server src-tauri/binaries/llama-quantize || true

      - name: Cargo.lock em dia (--locked)
        working-directory: src-tauri
        run: cargo fetch --locked

      # `tagName` vazio = o tauri-action compila e NÃO publica. O token segue
      # no ambiente porque a action o lê na inicialização, antes de decidir se
      # vai publicar — sem ele o passo pode morrer sem nem começar o build.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ""
          includeUpdaterJson: false
          args: ${{ matrix.tauri_args }}

      # Junta o que saiu num lugar só. Se o instalador não estiver aqui, o
      # release para AGORA, com a mensagem certa — e não daqui a 15 minutos
      # com "falha no upload", que mandaria investigar o lugar errado.
      - name: Separar o instalador
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          encontrou=0
          for p in src-tauri/target/release/bundle/nsis/*-setup.exe \
                   src-tauri/target/release/bundle/deb/*.deb \
                   src-tauri/target/release/bundle/appimage/*.AppImage \
                   src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -e "$p" ] || continue
            cp "$p" dist-release/
            echo "empacotado: $(basename "$p") ($(du -h "$p" | cut -f1))"
            encontrou=1
          done
          if [ "$encontrou" -eq 0 ]; then
            echo "::error::o build terminou sem instalador em ${{ matrix.os }}"
            exit 1
          fi

      - name: Guardar o instalador
        uses: actions/upload-artifact@v4
        with:
          name: instalador-${{ matrix.os }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # PUBLICA UMA VEZ SÓ, com tudo na mão.
  #
  # `needs` sem `if: always()` é de propósito: se qualquer plataforma falhou, é
  # melhor NÃO ter release nenhuma do que ter uma pela metade — o usuário que só
  # vê o .exe não tem como saber que faltou o AppImage.
  #
  # E como este job não compila nada, repetir uma publicação que falhou custa
  # segundos em vez de meia hora.
  # ---------------------------------------------------------------------------
  publicar:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Baixar os instaladores
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Conferir ANTES de criar a release
        shell: bash
        run: |
          set -uo pipefail
          ls -lh dist/
          falta=0
          ls dist/*-setup.exe >/dev/null 2>&1 \
            || { echo "::error::falta o instalador do Windows"; falta=1; }
          ls dist/*.AppImage >/dev/null 2>&1 \
            || { echo "::error::falta o AppImage"; falta=1; }
          exit $falta

      - name: Publicar (com retentativa)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          cat > notas.md <<'EOF'
          ## TaylorAI Studio __TAG__

          Builds automaticos via CI (Windows / Linux / macOS). Runtime do llama.cpp ${{ env.LLAMA_TAG }} incluso. Apenas o Windows foi testado no hardware-alvo; Linux/macOS sao build de CI.
          EOF
          sed -i "s/__TAG__/$TAG/g" notas.md

          publicar() {
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/* --clobber
            else
              gh release create "$TAG" dist/* \
                --title "TaylorAI Studio $TAG" --notes-file notas.md
            fi
          }

          for t in 1 2 3 4 5; do
            if publicar; then
              echo "publicado na tentativa $t"
              exit 0
            fi
            echo "tentativa $t falhou; esperando $((t * 20))s"
            sleep $((t * 20))
          done
          echo "::error::a publicação falhou 5 vezes seguidas"
          exit 1

      # Rede de segurança: confirma no servidor o que achamos ter subido.
      - name: Conferir a release publicada
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          nomes=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                    --json assets -q '.assets[].name' 2>/dev/null)
          echo "Anexos na release:"
          echo "${nomes:-(nenhum)}"
          falta=0
          echo "$nomes" | grep -q -- '-setup\.exe$' \
            || { echo "::error::o .exe não chegou na release"; falta=1; }
          echo "$nomes" | grep -q -- '\.AppImage$' \
            || { echo "::error::o AppImage não chegou na release"; falta=1; }
          exit $falta
